<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <script>
      (function () {
        function closeAllSubmenus(root) {
          root.querySelectorAll(".subnav-list").forEach((ul) => ul.hidden = true);
          root.querySelectorAll(".parent-link").forEach((btn) => {
            btn.setAttribute("aria-expanded", "false");
            btn.classList.remove("is-active");
          });
        }

        function toggleSubmenu(nav, btn) {
          const parentId = btn.getAttribute("data-parent");
          const submenu = nav.querySelector('.subnav-list[data-parent="' + parentId + '"]');
          if (!submenu) return;

          const isOpen = !submenu.hidden;

          closeAllSubmenus(nav);

          if (!isOpen) {
            submenu.hidden = false;
            btn.setAttribute("aria-expanded", "true");
            btn.classList.add("is-active");
          }
        }

        document.addEventListener("click", (e) => {
          const nav = document.querySelector(".site-nav");
          if (!nav) return;

          const parentBtn = e.target.closest(".parent-link");
          if (parentBtn) {
            e.preventDefault();
            toggleSubmenu(nav, parentBtn);
            return;
          }

          // Click outside nav closes any open submenu row
          if (!e.target.closest(".site-nav")) {
            closeAllSubmenus(nav);
          }
        });

        // Escape closes
        document.addEventListener("keydown", (e) => {
          if (e.key !== "Escape") return;
          const nav = document.querySelector(".site-nav");
          if (!nav) return;
          closeAllSubmenus(nav);
        });
      })();
    </script>

  </body>

</html>
